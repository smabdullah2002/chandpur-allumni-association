services:
  app:
    image: cp-alumni-app
    container_name: cp-alumni-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 5000
    restart: unless-stopped